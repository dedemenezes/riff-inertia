name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DB_USERNAME: root
      DB_PASSWORD: ""
      DB_HOST: 127.0.0.1
      DB_PORT: 3306

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libyaml-dev pkg-config google-chrome-stable

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'                    # enables npm caching
          cache-dependency-path: package-lock.json

      - name: Install JavaScript dependencies
        run: |
          npm ci
          # Lockfile generated on macOS omits Linux optional native modules; npm can skip
          # installing them on ubuntu (https://github.com/npm/cli/issues/4828). Pin versions
          # from package-lock.json so they stay aligned with rollup / tailwind / lightningcss.
          ROLLUP_VER=$(node -pe "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')).packages['node_modules/rollup'].version")
          OXIDE_LINUX_VER=$(node -pe "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')).packages['node_modules/@tailwindcss/oxide'].optionalDependencies['@tailwindcss/oxide-linux-x64-gnu']")
          LIGHTNING_LINUX_VER=$(node -pe "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')).packages['node_modules/lightningcss'].optionalDependencies['lightningcss-linux-x64-gnu']")
          npm install \
            "@rollup/rollup-linux-x64-gnu@${ROLLUP_VER}" \
            "@tailwindcss/oxide-linux-x64-gnu@${OXIDE_LINUX_VER}" \
            "lightningcss-linux-x64-gnu@${LIGHTNING_LINUX_VER}" \
            --no-save

      - name: Set up database
        run: |
          bin/rails db:create db:schema:load

      - name: Run tests
        env:
          RAILS_ENV: test
          IMAGES_BASE_URL: ${{ secrets.IMAGES_BASE_URL }}
          YT_BASE_URL: ${{ secrets.YT_BASE_URL }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
        run: bin/rails test # test:system

      # - name: Keep screenshots from failed system tests
      #   uses: actions/upload-artifact@v4
